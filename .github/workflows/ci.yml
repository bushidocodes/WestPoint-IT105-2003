name: CI
on: [push, pull_request]
jobs:
  compile-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Compile all Java files
        run: javac --enable-preview --release 25 Seven27.java TigerWoods.java TigerWoodsExtraCredit.java

      - name: Smoke-test TigerWoods
        run: printf "100\n0\n0\n" | java --enable-preview TigerWoods.java
